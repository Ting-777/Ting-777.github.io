<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>豚师斗恶劳</title>
    <style>
:root {
  --bg-top: #08101a;
  --bg-bottom: #20355a;
  --panel: #13263f;
  --panel-border: #97bce7;
  --text: #ecf5ff;
  --muted: #aecdf1;
  --button: #264975;
  --button-hover: #3a6aaa;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  color: var(--text);
  font-family: "Consolas", "Courier New", monospace;
  background: radial-gradient(circle at 15% 8%, #395e8d 0, transparent 35%),
    radial-gradient(circle at 80% 5%, #6f4b28 0, transparent 32%),
    linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.08;
  background: repeating-linear-gradient(
    180deg,
    rgba(255, 255, 255, 0.8) 0,
    rgba(255, 255, 255, 0.8) 1px,
    transparent 1px,
    transparent 4px
  );
}

.app {
  width: min(1220px, 95vw);
  margin: 0 auto;
  padding: 16px 0 22px;
}

.hidden {
  display: none !important;
}

.panel {
  border: 3px solid var(--panel-border);
  border-radius: 4px;
  background: linear-gradient(180deg, #1b3559, var(--panel));
  box-shadow: 0 0 0 3px rgba(8, 20, 35, 0.9) inset;
}

.top-banner {
  text-align: center;
  padding: 12px;
  margin-bottom: 12px;
}

.top-banner h1 {
  margin: 0;
  letter-spacing: 2px;
}

.top-banner p {
  margin: 8px 0 0;
  color: var(--muted);
}

.title-panel {
  max-width: 980px;
  margin: 0 auto;
  padding: 16px;
  line-height: 1.7;
}

.mode-list {
  margin-top: 14px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 10px;
}

button {
  width: 100%;
  border: 2px solid #9dc3f1;
  border-radius: 2px;
  background: linear-gradient(180deg, #416ca4, var(--button));
  color: var(--text);
  font: inherit;
  padding: 9px 12px;
  cursor: pointer;
}

button:hover:not(:disabled) {
  background: linear-gradient(180deg, #5484c2, var(--button-hover));
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.hint {
  margin: 12px 0 0;
  color: var(--muted);
}

#game-screen {
  margin-top: 12px;
}

.world-layout {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 12px;
}

.map-panel {
  padding: 10px;
}

#game-canvas {
  display: block;
  width: 100%;
  height: auto;
  border: 2px solid #85afdd;
  background: #0d1d30;
  image-rendering: pixelated;
}

.status-panel {
  padding: 12px;
}

.status-panel h2,
.status-panel h3 {
  margin-top: 0;
}

.status-panel p {
  margin: 6px 0;
  color: var(--muted);
}

.status-panel button {
  width: 100%;
  margin: 6px 0 8px;
}

.status-panel ul {
  margin: 8px 0 0;
  padding-left: 18px;
  color: var(--muted);
  line-height: 1.45;
}

#quest-log {
  margin-top: 6px;
}

#quest-log li {
  margin-bottom: 6px;
}

.dialog-panel,
.battle-panel,
.ending-panel {
  margin-top: 12px;
  padding: 12px;
}

.dialog-panel h2,
.battle-panel h2,
.ending-panel h2 {
  margin: 0 0 10px;
}

#dialog-text,
#ending-text {
  min-height: 70px;
}

#dialog-text p,
#ending-text p {
  margin: 0 0 8px;
  line-height: 1.6;
}

.dialog-actions,
.battle-actions {
  margin-top: 8px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 8px;
}

#battle-enemy,
#battle-hero {
  margin: 0 0 8px;
  color: var(--muted);
}

.dialog-panel {
  position: fixed;
  left: 16px;
  bottom: 16px;
  width: min(520px, 92vw);
  max-height: 55vh;
  overflow: auto;
  z-index: 9;
}

.battle-panel {
  position: fixed;
  right: 16px;
  bottom: 16px;
  width: min(420px, 92vw);
  max-height: 60vh;
  overflow: auto;
  z-index: 10;
}

.battle-log {
  margin-top: 10px;
  border: 2px solid #7ba5db;
  background: rgba(4, 10, 21, 0.85);
  padding: 8px;
  max-height: 170px;
  overflow: auto;
}

.battle-log p {
  margin: 0 0 6px;
  color: #c6dcff;
  line-height: 1.4;
}

.dpad {
  position: fixed;
  left: 50%;
  bottom: 16px;
  transform: translateX(-50%);
  display: grid;
  grid-template-columns: repeat(3, 54px);
  grid-template-rows: repeat(3, 54px);
  gap: 6px;
  z-index: 20;
}

.dpad-btn {
  width: 54px;
  height: 54px;
  padding: 0;
}

.dpad-up {
  grid-column: 2;
  grid-row: 1;
}

.dpad-left {
  grid-column: 1;
  grid-row: 2;
}

.dpad-center {
  grid-column: 2;
  grid-row: 2;
}

.dpad-right {
  grid-column: 3;
  grid-row: 2;
}

.dpad-down {
  grid-column: 2;
  grid-row: 3;
}

.ending-panel {
  max-width: 980px;
  margin-left: auto;
  margin-right: auto;
}

@media (max-width: 980px) {
  .world-layout {
    grid-template-columns: 1fr;
  }

  .dialog-panel {
    left: 10px;
    right: 10px;
    top: 10px;
    bottom: auto;
    width: auto;
    max-height: 35vh;
  }

  .battle-panel {
    left: 10px;
    right: 10px;
    width: auto;
    max-height: 55vh;
  }

  .dpad {
    bottom: 12px;
    grid-template-columns: repeat(3, 46px);
    grid-template-rows: repeat(3, 46px);
  }

  .dpad-btn {
    width: 46px;
    height: 46px;
  }
}
    </style>
  </head>
  <body>
    <main class="app">
      <header class="panel top-banner">
        <h1>豚师斗恶劳</h1>
        <p>©2026 海豚蒂国.</p>
      </header>

      <section id="title-screen" class="panel title-panel">
        <p>
          你操控豚师 Tim 在海豚蒂国闯民居、入城堡、会三巨头、清Boss、再切磋，
          最后克东境要塞狠狠干翻 ldj 啵。
        </p>
        <div class="mode-list">
          <button data-mode="speed" type="button">简单</button>
          <button data-mode="standard" type="button">普通</button>
          <button data-mode="hard" type="button">困难</button>
        </div>
        <p class="hint">移动：方向键 / WASD | 交互：Enter / Space | 卖谷票：G | 战斗：1-8</p>
      </section>

      <section id="game-screen" class="hidden">
        <div class="world-layout">
          <article class="panel map-panel">
            <canvas id="game-canvas" width="640" height="480" aria-label="像素地图"></canvas>
          </article>

          <aside class="panel status-panel">
            <h2>状态</h2>
            <p id="map-name">地图：</p>
            <p id="hero-stats">HP：</p>
            <p id="bag-stats">背包：</p>
            <p id="money-stats">豚币：</p>
            <button id="sell-gupiao-btn" type="button">卖谷票</button>
            <p id="quest-stats">主线：</p>
            <p id="time-stats">时长：</p>
            <h3>探索说明</h3>
            <ul>
              <li>面向 NPC 按 Enter/Space 对话咯。</li>
              <li>站门口就能进出房屋 / 城堡 / 要塞。</li>
              <li>先清两位Boss，再和三巨头切磋，最后打 ldj 魔王。</li>
            </ul>
            <h3>任务日志</h3>
            <ul id="quest-log"></ul>
          </aside>
        </div>

        <section id="dialog-panel" class="panel dialog-panel hidden">
          <h2 id="dialog-speaker">旁白</h2>
          <div id="dialog-text"></div>
          <div id="dialog-actions" class="dialog-actions"></div>
        </section>

        <section id="battle-panel" class="panel battle-panel hidden">
          <h2 id="battle-title">战斗</h2>
          <p id="battle-enemy"></p>
          <p id="battle-hero"></p>
          <div id="battle-actions" class="battle-actions"></div>
          <div id="battle-log" class="battle-log"></div>
        </section>
      </section>

        <div class="dpad hidden" id="dpad">
          <button type="button" class="dpad-btn dpad-up" data-move="up">上</button>
          <button type="button" class="dpad-btn dpad-left" data-move="left">左</button>
          <button type="button" class="dpad-btn dpad-center" data-action="interact">交互</button>
          <button type="button" class="dpad-btn dpad-right" data-move="right">右</button>
          <button type="button" class="dpad-btn dpad-down" data-move="down">下</button>
        </div>

      <section id="ending-screen" class="panel ending-panel hidden">
        <h2 id="ending-title">结局</h2>
        <div id="ending-text"></div>
        <button id="restart-btn" type="button">再来一盘转转盘</button>
      </section>
    </main>
    <script>
const MAP_HEIGHT = {
  town: 20,
  house: 10,
  castle: 12,
  fortress: 14,
  arena: 10,
  suzhou: 12,
};

const MAP_WIDTH = {
  town: 30,
  house: 12,
  castle: 18,
  fortress: 22,
  arena: 14,
  suzhou: 18,
};

function createGrid(width, height, fill) {
  return Array.from({ length: height }, () => Array.from({ length: width }, () => fill));
}

function fillRect(grid, x, y, width, height, tile) {
  for (let row = y; row < y + height; row += 1) {
    for (let col = x; col < x + width; col += 1) {
      grid[row][col] = tile;
    }
  }
}

function toRows(grid) {
  return grid.map((row) => row.join(""));
}

function createTown() {
  const width = MAP_WIDTH.town;
  const height = MAP_HEIGHT.town;
  const grid = createGrid(width, height, ".");

  fillRect(grid, 0, 0, width, 1, "#");
  fillRect(grid, 0, height - 1, width, 1, "#");
  fillRect(grid, 0, 0, 1, height, "#");
  fillRect(grid, width - 1, 0, 1, height, "#");

  for (let x = 1; x < width - 1; x += 1) {
    grid[10][x] = "=";
  }
  for (let y = 2; y < height - 1; y += 1) {
    grid[y][14] = "=";
  }

  fillRect(grid, 22, 2, 7, 6, "~");
  for (let x = 22; x < 29; x += 1) {
    grid[5][x] = "=";
  }

  fillRect(grid, 5, 6, 6, 4, "H");
  grid[9][8] = "D";

  fillRect(grid, 3, 13, 6, 4, "H");
  grid[16][6] = ".";

  fillRect(grid, 18, 11, 10, 6, "C");
  grid[16][23] = "D";

  fillRect(grid, 2, 2, 5, 4, ",");
  fillRect(grid, 9, 3, 4, 3, ",");
  fillRect(grid, 2, 17, 8, 2, ",");

  grid[10][28] = "G";
  grid[5][3] = "G";
  grid[2][25] = "G";

  return {
    id: "town",
    name: "海豚蒂国首府柏林",
    width,
    height,
    rows: toRows(grid),
    encounters: ["overtime-slime", "audit-bat"],
    encounterTiles: [",", "."],
    encounterRate: 0.08,
  };
}

function createHouse() {
  const width = MAP_WIDTH.house;
  const height = MAP_HEIGHT.house;
  const grid = createGrid(width, height, "f");

  fillRect(grid, 0, 0, width, 1, "w");
  fillRect(grid, 0, height - 1, width, 1, "w");
  fillRect(grid, 0, 0, 1, height, "w");
  fillRect(grid, width - 1, 0, 1, height, "w");

  fillRect(grid, 2, 2, 2, 2, "b");
  fillRect(grid, 8, 2, 2, 2, "b");
  grid[9][5] = "D";

  grid[6][3] = "O";
  grid[6][4] = "O";
  grid[6][7] = "O";
  grid[4][5] = "P";

  return {
    id: "house",
    name: "攀哥民居",
    width,
    height,
    rows: toRows(grid),
    encounters: [],
    encounterTiles: [],
    encounterRate: 0,
  };
}

function createCastle() {
  const width = MAP_WIDTH.castle;
  const height = MAP_HEIGHT.castle;
  const grid = createGrid(width, height, "f");

  fillRect(grid, 0, 0, width, 1, "w");
  fillRect(grid, 0, height - 1, width, 1, "w");
  fillRect(grid, 0, 0, 1, height, "w");
  fillRect(grid, width - 1, 0, 1, height, "w");

  fillRect(grid, 7, 2, 4, 2, "t");
  grid[11][8] = "D";

  grid[7][5] = "O";
  grid[7][6] = "O";
  grid[7][11] = "O";
  grid[5][9] = "P";

  return {
    id: "castle",
    name: "蓝脑壳城堡",
    width,
    height,
    rows: toRows(grid),
    encounters: [],
    encounterTiles: [],
    encounterRate: 0,
  };
}

function createFortress() {
  const width = MAP_WIDTH.fortress;
  const height = MAP_HEIGHT.fortress;
  const grid = createGrid(width, height, ".");

  fillRect(grid, 0, 0, width, 1, "#");
  fillRect(grid, 0, height - 1, width, 1, "#");
  fillRect(grid, 0, 0, 1, height, "#");
  fillRect(grid, width - 1, 0, 1, height, "#");

  for (let x = 1; x < width - 1; x += 1) {
    grid[7][x] = "=";
  }

  fillRect(grid, 14, 4, 6, 6, "M");
  for (let x = 14; x <= 19; x += 1) {
    grid[7][x] = "=";
  }
  grid[6][17] = ".";
  grid[7][17] = ".";
  grid[8][17] = ".";

  grid[7][1] = "D";
  grid[7][18] = "=";

  fillRect(grid, 4, 3, 4, 3, ",");
  fillRect(grid, 8, 9, 4, 3, ",");

  return {
    id: "fortress",
    name: "东境要塞",
    width,
    height,
    rows: toRows(grid),
    encounters: ["kpi-hound", "paper-drake"],
    encounterTiles: [".", ",", "="],
    encounterRate: 0.12,
  };
}

function createArena() {
  const width = MAP_WIDTH.arena;
  const height = MAP_HEIGHT.arena;
  const grid = createGrid(width, height, "f");

  fillRect(grid, 0, 0, width, 1, "w");
  fillRect(grid, 0, height - 1, width, 1, "w");
  fillRect(grid, 0, 0, 1, height, "w");
  fillRect(grid, width - 1, 0, 1, height, "w");

  fillRect(grid, 2, 2, 3, 2, "b");
  fillRect(grid, 9, 2, 3, 2, "b");
  grid[height - 1][6] = "D";
  grid[5][6] = "t";
  grid[6][6] = "t";

  return {
    id: "arena",
    name: "竞技场",
    width,
    height,
    rows: toRows(grid),
    encounters: [],
    encounterTiles: [],
    encounterRate: 0,
  };
}

function createSuzhouGarden() {
  const width = MAP_WIDTH.suzhou;
  const height = MAP_HEIGHT.suzhou;
  const grid = createGrid(width, height, ".");

  fillRect(grid, 0, 0, width, 1, "#");
  fillRect(grid, 0, height - 1, width, 1, "#");
  fillRect(grid, 0, 0, 1, height, "#");
  fillRect(grid, width - 1, 0, 1, height, "#");

  fillRect(grid, 2, 2, 6, 4, "~");
  fillRect(grid, 10, 3, 5, 3, "~");
  fillRect(grid, 3, 7, 10, 2, ",");

  for (let x = 1; x < width - 1; x += 1) {
    grid[height - 2][x] = "=";
  }

  grid[height - 1][8] = "D";
  grid[6][12] = "L";

  return {
    id: "suzhou",
    name: "苏州园林",
    width,
    height,
    rows: toRows(grid),
    encounters: [],
    encounterTiles: [],
    encounterRate: 0,
  };
}

const MAPS = {
  town: createTown(),
  house: createHouse(),
  castle: createCastle(),
  fortress: createFortress(),
  arena: createArena(),
  suzhou: createSuzhouGarden(),
};

const BLOCKED_TILES = new Set(["#", "~", "H", "C", "w", "b", "t", "M", "O", "P", "L"]);

const WARP_POINTS = {
  "town:8,9": { toMap: "house", x: 5, y: 8, dir: "up" },
  "house:5,9": { toMap: "town", x: 8, y: 10, dir: "down" },
  "town:23,16": { toMap: "castle", x: 8, y: 10, dir: "up" },
  "castle:8,11": { toMap: "town", x: 23, y: 17, dir: "down" },
  "town:28,10": {
    toMap: "fortress",
    x: 2,
    y: 7,
    dir: "right",
    requires: "spar_done",
    lockedText: [
      "东门封着咯。",
      "先清两位Boss，再找三巨头切磋，才开门啵。",
    ],
  },
  "fortress:1,7": { toMap: "town", x: 27, y: 10, dir: "left" },
  "town:3,5": { toMap: "arena", x: 6, y: 8, dir: "up" },
  "arena:6,9": { toMap: "town", x: 3, y: 6, dir: "down" },
  "town:25,2": { toMap: "suzhou", x: 8, y: 10, dir: "up", requires: "suzhou_key", lockedText: ["园林没钥匙，李妈妈别。"] },
  "suzhou:8,11": { toMap: "town", x: 25, y: 1, dir: "down" },
};

const SIGNS = {
  "town:14,2": [
    "这别公告：八子计划铁律。",
    "志愿者不参与政务；不分割豚产咯。",
  ],
  "town:11,12": [
    "这别警示：伞沪不要吵谷。",
    "散户嗯抄底、。",
  ],
};

const SHOPS = {
  "town-shop": {
    name: "豚市小铺",
    items: [
      { id: "vc", name: "恰vc咯", price: 22, bagKey: "vc", amount: 1 },
      { id: "vd", name: "恰vd咯", price: 28, bagKey: "vd", amount: 1 },
      { id: "tonic", name: "转盘酊", price: 26, bagKey: "tonic", amount: 1 },
      { id: "gupiao", name: "谷票", price: 50, bagKey: null, amount: 1 },
      { id: "suzhou-garden", name: "苏州园林", price: 1000, bagKey: null, amount: 1 },
    ],
  },
};

const NPCS = [
    {
    id: "tingge",
    mapId: "town",
    x: 12,
    y: 10,
    name: "听歌",
    palette: { hair: "#c280ff", body: "#5f7dff", accent: "#efe6ff" },
    firstLines: [
      "听歌：口径我写好了啵。",
      "汪子翼思想要入档，别乱来咯。",
      "主线更新：去找攀哥和炫神。",
    ],
    repeatLines: ["听歌：这别口径不改，克找剩下俩。"],
    sparLines: [
      "听歌：Boss清完了啵，来切磋文案与拳头。",
      "我：那岂不是开盘。",
    ],
    sparRepeatLines: ["听歌：切磋已过，冲 ldj 去。"],
    sparId: "spar-tingge",
    questFlag: "talk_tingge",
  },
  {
    id: "shopkeeper",
    mapId: "town",
    x: 9,
    y: 12,
    name: "豚市老板",
    palette: { hair: "#6c5139", body: "#3c8b72", accent: "#f0e5d6" },
    shopId: "town-shop",
  },
    {
    id: "pange",
    mapId: "house",
    x: 6,
    y: 4,
    name: "攀哥",
    palette: { hair: "#8f5f3a", body: "#2f8b6f", accent: "#d9f2df" },
    firstLines: [
      "攀哥：流程卡位，谁嗯摸鱼。",
      "监督表写满，逃避监督也要推进。",
      "主线更新：炫神在城堡等你咯。",
    ],
    repeatLines: ["攀哥：流程已经锁死，继续走。"],
    sparLines: [
      "攀哥：Boss清完了，切磋流程与拳头。",
      "我：那你岂不是来真格。",
    ],
    sparRepeatLines: ["攀哥：切磋已过，继续推进。"],
    sparId: "spar-pange",
    questFlag: "talk_pange",
  },
    {
    id: "xuanshen",
    mapId: "castle",
    x: 8,
    y: 5,
    name: "炫神",
    palette: { hair: "#ff764d", body: "#2c6ea7", accent: "#ffe5db" },
    firstLines: [
      "炫神：舆论我拉满，豚民都在线。",
      "三巨头已集结，Boss可以开咯。",
      "主线更新：去镇里和城堡清Boss。",
    ],
    repeatLines: ["炫神：先清Boss，再去要塞。"],
    sparLines: [
      "炫神：Boss清完了啵？来切磋，舆论也要练。",
      "我：那岂不是带节奏。",
    ],
    sparRepeatLines: ["炫神：切磋完咯，去要塞收工。"],
    sparId: "spar-xuanshen",
    questFlag: "talk_xuanshen",
  },
  {
    id: "audit-chief",
    mapId: "town",
    x: 18,
    y: 9,

function init() {
  for (const button of modeButtons) {
    button.addEventListener("click", () => startGame(button.dataset.mode || "standard"));
  }

  refs.restartButton.addEventListener("click", () => resetToTitle());
  document.addEventListener("keydown", onKeydown);
  bindDpad();
  if (refs.sellGupiaoBtn) {
    refs.sellGupiaoBtn.addEventListener("click", () => openSellGupiao());
  }
  renderPanels();
}

function bindDpad() {
  const wrapInput = (handler) => (event) => {
    if (event.type === "touchstart") {
      lastTouchTime = Date.now();
    } else if (event.type === "click" && Date.now() - lastTouchTime < 350) {
      return;
    }
    event.preventDefault();
    handler();
  };

  dpadMoveButtons.forEach((button) => {
    const dir = button.dataset.move;
    const handler = wrapInput(() => handleMoveInput(dir));
    button.addEventListener("touchstart", handler, { passive: false });
    button.addEventListener("click", handler);
  });

  dpadActionButtons.forEach((button) => {
    const handler = wrapInput(() => handleInteractInput());
    button.addEventListener("touchstart", handler, { passive: false });
    button.addEventListener("click", handler);
  });
}

function handleMoveInput(dir) {
  if (dir === "up") return tryMove(0, -1, "up");
  if (dir === "down") return tryMove(0, 1, "down");
  if (dir === "left") return tryMove(-1, 0, "left");
  if (dir === "right") return tryMove(1, 0, "right");
}

function handleInteractInput() {
  if (game.dialog) {
    stepDialog();
    return;
  }
  if (game.phase === "explore") {
    interact();
  }
}

  const mode = MODES[modeKey] ?? MODES.standard;

  ]);

  renderPanels();
}

function resetToTitle() {
  game.phase = "title";
  game.dialog = null;
  game.battle = null;
  game.ending = null;
  renderPanels();
}

function onKeydown(event) {
  const key = event.key.toLowerCase();

  if (game.phase === "title") {
    if (key === "1") startGame("speed");
    if (key === "2") startGame("standard");
    if (key === "3") startGame("hard");
    return;
  }

  if (game.phase === "ending") {
    if (key === "enter" || key === "r") {
      resetToTitle();
      event.preventDefault();
    }
    return;
  }

  if (game.dialog) {
    if (key === "arrowup" || key === "w") {
      moveDialogChoice(-1);
      event.preventDefault();
      return;
    }
    if (key === "arrowdown" || key === "s") {
      moveDialogChoice(1);
      event.preventDefault();
      return;
    }
    if (key === "enter" || key === " ") {
      stepDialog();
      event.preventDefault();
    }
    return;
  }

  if (game.phase === "battle") {
    const action = BATTLE_ACTIONS.find((item) => item.hotkey === key);
    if (action) {
      runBattleTurn(action.id);
      event.preventDefault();
    }
    return;
  }

  if (key === "arrowup" || key === "w") {
    tryMove(0, -1, "up");
    event.preventDefault();
    return;
  }
  if (key === "arrowdown" || key === "s") {
    tryMove(0, 1, "down");
    event.preventDefault();
    return;
  }
  if (key === "arrowleft" || key === "a") {
    tryMove(-1, 0, "left");
    event.preventDefault();
    return;
  }
  if (key === "arrowright" || key === "d") {
    tryMove(1, 0, "right");
    event.preventDefault();
    return;
  }

  if (key === "g") {
    openSellGupiao();
    event.preventDefault();
    return;
  }

  if (key === "enter" || key === " ") {
    interact();
    event.preventDefault();
  }
}

function tryMove(dx, dy, dir) {
  if (game.phase !== "explore" || game.dialog || game.battle) {
    return;
  }

  game.player.dir = dir;
  const nextX = game.player.x + dx;
  const nextY = game.player.y + dy;
  const map = MAPS[game.mapId];

  if (nextX < 0 || nextY < 0 || nextX >= map.width || nextY >= map.height) {
    return;
  }

  const npc = findNpcAt(game.mapId, nextX, nextY);
  if (npc) {
    return;
  }

  const tile = getTile(game.mapId, nextX, nextY);
  if (BLOCKED_TILES.has(tile)) {
    return;
  }

  game.player.x = nextX;
  game.player.y = nextY;
  game.player.frame = game.player.frame === 0 ? 1 : 0;
  game.runMoves += 1;
  updateGupiaoPrice();

  const warpHandled = handleWarp(nextX, nextY);
  if (!warpHandled) {
    tryRandomEncounter(tile);
  }

  renderPanels();
}

function updateGupiaoPrice() {
  const delta = Math.random() * 0.2 - 0.097;
  game.gupiaoPrice = Math.max(1, Math.round(game.gupiaoPrice * (1 + delta)));
}

function handleWarp(x, y) {
  const key = `${game.mapId}:${x},${y}`;
  const warp = WARP_POINTS[key];
  if (!warp) {
    return false;
  }

  if (warp.requires === "trio_done" && !isTrioDone()) {
    openDialog("门卫", warp.lockedText || ["门封着咯。"]);
    return true;
  }

  if (warp.requires === "bosses_done" && !areBossesDone()) {
    openDialog("门卫", warp.lockedText || ["门封着咯。"]);
    return true;
  }

  if (warp.requires === "spar_done" && !isSparDone()) {
    openDialog("门卫", warp.lockedText || ["门封着咯。"]);
    return true;
  }

  if (warp.requires === "suzhou_key" && !game.suzhouKey) {
    openDialog("门卫", warp.lockedText || ["园林封着咯。"]);
    return true;
  }

  game.mapId = warp.toMap;
  game.player.x = warp.x;
  game.player.y = warp.y;
  game.player.dir = warp.dir;
  openDialog("旁白", [`进入：${MAPS[game.mapId].name}`]);
  return true;
}

function interact() {
  if (game.phase !== "explore") {
    return;
  }

  const { x, y } = getFacingTile();
  const npc = findNpcAt(game.mapId, x, y);
  if (npc) {
    talkToNpc(npc);
    return;
  }

  const sign = SIGNS[`${game.mapId}:${x},${y}`];
  if (sign) {
    openDialog("告示", sign);
    return;
  }

  const tile = getTile(game.mapId, x, y);
  if (tile === "O") {
    openDialog("旁白", ["这别是桌椅，别撞。"]);
    return;
  }
  if (tile === "P") {
    openDialog("旁白", ["这别是书柜，想看也李妈妈别。"]);
    return;
  }

    if (tile === "L") {
    if (game.legendaryTaken) {
      openDialog("旁白", ["宝箱空咯，啥都没。"]);
      return;
    }
    game.legendaryTaken = true;
    const bonusAtk = 24;
    const bonusDef = 6;
    const bonusHp = 60;
    game.hero.atk += bonusAtk;
    game.hero.def += bonusDef;
    game.hero.maxHp += bonusHp;
    game.hero.hp = game.hero.maxHp;
    const weaponName = game.weapon ? `${game.weapon}+苏园神兵` : "苏园神兵";
    game.weapon = weaponName;
    pushQuestLog("苏园神兵入手，攻防暴涨。", false);
    openDialog("旁白", [
      "苏州园林传奇宝箱开盘。",
      `获得苏园神兵：攻 +${bonusAtk}，防 +${bonusDef}，HP +${bonusHp}。`,
    ]);
    return;
  }

  openDialog("旁白", ["这别地方没啥可聊、。"]);
}

function talkToNpc(npc) {
  if (npc.requires === "trio_done" && !isTrioDone()) {
    openDialog(npc.name, npc.lockedLines || ["还没到你出场。"]);
    return;
  }

  if (npc.requires === "bosses_done" && !areBossesDone()) {
    openDialog(npc.name, npc.lockedLines || ["Boss没清完。"]);
    return;
  }

  if (npc.requires === "spar_done" && !isSparDone()) {
    openDialog(npc.name, npc.lockedLines || ["切磋没完。"]);
    return;
  }

  if (npc.shopId) {
    openShop(npc.shopId);
    return;
  }

  if (npc.hiddenBattleId) {
    if (game.hiddenBossDefeated) {
      openDialog(npc.name, npc.afterLines || ["收工咯。"]);
      return;
    }
    openDialog(npc.name, npc.firstLines || ["开打咯。"], () => {
      promptBattle(npc.name, npc.hiddenBattleId, "要不要帮肝脏开打啵？");
    });
    return;
  }

  if (npc.volunteerId) {
    const joined = game.volunteerFlags.has(npc.volunteerId);
    const lines = joined ? npc.repeatLines : npc.firstLines;
    openDialog(npc.name, lines, () => {
      if (!joined) {
        game.volunteerFlags.add(npc.volunteerId);
        const count = getVolunteerProgress();
        pushQuestLog(`志愿者到位（${count}/8）。`, false);
        checkVolunteerUnlock();
      }
    });
    return;
  }

  const canSpar = npc.sparId && areBossesDone() && !game.sparFlags.has(npc.sparId);
  if (canSpar) {
    openDialog(npc.name, npc.sparLines || ["来切磋。"], () => {
      promptBattle(npc.name, npc.sparId, "切磋开盘啵？");
    });
    return;
  }

  if (npc.sparId && game.sparFlags.has(npc.sparId) && npc.sparRepeatLines) {
    openDialog(npc.name, npc.sparRepeatLines);
    return;
  }

  const firstTalk = npc.questFlag && !game.talkedFlags.has(npc.questFlag);
  const lines = firstTalk ? npc.firstLines : npc.repeatLines;

  openDialog(npc.name, lines, () => {
    if (firstTalk) {
      game.talkedFlags.add(npc.questFlag);
      updateObjective();
    }

    if (npc.battleId && !game.bossDefeated) {
      promptBattle(npc.name, npc.battleId, "要开打啵？");
    }
  });
}

function openShop(shopId) {
  const shop = SHOPS[shopId];
  if (!shop) {
    openDialog("旁白", ["这别店不开门。"]);
    return;
  }

  // 1. 在生成选项时，动态获取当前价格
  const choices = shop.items.map((item) => {
    if (item.id === "suzhou-garden" && game.suzhouKey) {
      return { label: `${item.name} - 已购`, value: "suzhou-owned" };
    }
    
    // 如果是谷票，就用动态价格，否则用固定的 item.price
    const currentPrice = item.id === "gupiao" ? game.gupiaoPrice : item.price;
    return { label: `${item.name} - ${currentPrice} 豚币`, value: item.id };
  });
  
  choices.push({ label: "李妈妈别，先走", value: "leave" });

  openDialog(
    shop.name,
    [`豚币：${game.money}。要买么子啵？`],
    null,
    choices,
    (choiceId) => {
      if (choiceId === "leave") {
        openDialog("旁白", ["老板挥手：下回再来咯。"]);
        return;
      }
      if (choiceId === "suzhou-owned") {
        openDialog("豚市老板", ["苏州园林你已经买了咯。"], () => openShop(shopId));
        return;
      }

      const item = shop.items.find((entry) => entry.id === choiceId);
      if (!item) {
        openDialog("旁白", ["这别东西不存在。"]);
        return;
      }
      
      // 2. 结算时，同样动态判断实际需要扣多少钱
      const actualPrice = item.id === "gupiao" ? game.gupiaoPrice : item.price;

      if (game.money < actualPrice) {
        openDialog("豚市老板", ["豚币不够咯。"]);
        return;
      }

      // 扣除实际价格
      game.money -= actualPrice;

      if (item.id === "vc") {
        game.bag.vc += 1;
        openDialog("豚市老板", ["VC到账，晓得恰咯。"], () => openShop(shopId));
        return;
      }
      if (item.id === "vd") {
        game.bag.vd += 1;
        openDialog("豚市老板", ["VD到账，晓得恰咯。"], () => openShop(shopId));
        return;
      }
      if (item.id === "tonic") {
        game.bag.tonic += 1;
        openDialog("豚市老板", ["转盘酊到账，蓝条起飞。"], () => openShop(shopId));
        return;
      }
      if (item.id === "gupiao") {
        game.bag.gupiao = (game.bag.gupiao || 0) + 1;
        openDialog("豚市老板", ["谷票入袋，盘面随步数波动咯。"], () => openShop(shopId));
        return;
      }
      if (item.id === "suzhou-garden") {
        game.suzhouKey = true;
        pushQuestLog("购买苏州园林，钥匙到手。", false);
        openDialog("豚市老板", ["苏州园林钥匙拿走咯。"], () => openShop(shopId));
        return;
      }

      openDialog("旁白", ["买到了，不过你也不晓得是么子。"]);
    }
  );
}

function openSellGupiao() {
  if (game.phase !== "explore" || game.dialog || game.battle) {
    return;
  }

  const count = game.bag.gupiao || 0;
  if (count <= 0) {
    openDialog("旁白", ["谷票为0，李妈妈别。"]);
    return;
  }

  const choices = [];
  if (count >= 1) choices.push({ label: "卖 1 张", value: "1" });
  if (count >= 5) choices.push({ label: "卖 5 张", value: "5" });
  if (count >= 10) choices.push({ label: "卖 10 张", value: "10" });
  choices.push({ label: `卖全部（${count}）`, value: "all" });
  choices.push({ label: "李妈妈别", value: "leave" });

  openDialog(
    "谷票盘面",
    [`当前价 ${game.gupiaoPrice} 豚币/张。要卖几张啵？`],
    null,
    choices,
    (choiceId) => {
      if (choiceId === "leave") {
        return;
      }

      const qty = choiceId === "all" ? count : Number.parseInt(choiceId, 10);
      const sellQty = Number.isFinite(qty) ? Math.min(count, qty) : count;
      const revenue = sellQty * game.gupiaoPrice;
      game.bag.gupiao = Math.max(0, count - sellQty);
      game.money += revenue;

      openDialog("旁白", [`卖出${sellQty}张，收${revenue}豚币。`], () => {
        if (game.bag.gupiao > 0) {
          openSellGupiao();
        }
      });
    }
  );
}

function updateObjective() {
  const trio = getTrioProgress();
  const bossCount = getBossProgress();
  const sparCount = getSparProgress();

  if (game.bossDefeated) {
    game.objective = "主线收工咯。";
    pushQuestLog("ldj 已下线，收工。", false);
    return;
  }

  if (trio < 3) {
    game.objective = `去会听歌、攀哥、炫神（${trio}/3）。`;
  } else if (bossCount < 2) {
    game.objective = `清Boss Boss（${bossCount}/2）：中信行长 + 雷军。`;
  } else if (sparCount < 3) {
    game.objective = `找三巨头切磋武艺（${sparCount}/3）。`;
  } else {
    game.objective = "去东境要塞狠狠干翻 ldj。";
  }
}

function getTrioProgress() {
  let count = 0;
  if (game.talkedFlags.has("talk_tingge")) count += 1;
  if (game.talkedFlags.has("talk_pange")) count += 1;
  if (game.talkedFlags.has("talk_xuanshen")) count += 1;
  return count;
}

function isTrioDone() {
  return getTrioProgress() >= 3;
}

function getBossProgress() {
  let count = 0;
  if (game.bossFlags.has("audit-chief")) count += 1;
  if (game.bossFlags.has("opinion-engine")) count += 1;
  return count;
}

function getSparProgress() {
  let count = 0;
  if (game.sparFlags.has("spar-tingge")) count += 1;
  if (game.sparFlags.has("spar-pange")) count += 1;
  if (game.sparFlags.has("spar-xuanshen")) count += 1;
  return count;
}

function getVolunteerProgress() {
  return game.volunteerFlags.size;
}

function checkVolunteerUnlock() {
  if (game.edictUnlocked) {
    return false;
  }
  if (getVolunteerProgress() >= 8) {
    game.edictUnlocked = true;
    pushQuestLog("八子计划到位，八子宣言解锁。", false);
    return true;
  }
  return false;
}

function isSparDone() {
  return getSparProgress() >= 3;
}

function areBossesDone() {
  return getBossProgress() >= 2;
}
function tryRandomEncounter(tile) {
  const map = MAPS[game.mapId];
  if (!map.encounters.length || !map.encounterTiles.includes(tile)) {
    return;
  }

  const rate = map.encounterRate;
  if (Math.random() >= rate) {
    return;
  }

  const enemyId = map.encounters[randomInt(0, map.encounters.length - 1)];
  startBattle(enemyId);
}

function startBattle(enemyId) {
  const base = BATTLES[enemyId];
  if (!base) {
    return;
  }

  const scale = game.mode?.enemyScale ?? 1;
  const hp = Math.round(base.hp * scale);
  const atk = Math.round(base.atk * scale);
  const def = Math.round(base.def * scale);

  game.phase = "battle";
  game.battle = {
    isBoss: Boolean(base.boss),
    enemy: { ...base, hp, maxHp: hp, atk, def },
    turn: 1,
  };
  game.battleLogs = [`战斗开盘：${base.name}`];
  renderPanels();
}

function runBattleTurn(actionId) {
  if (!game.battle) {
    return;
  }

  applyOvertimeTick();
  if (game.hero.hp <= 0) {
    loseBattle();
    return;
  }

  runHeroAction(actionId);
  if (!game.battle) {
    return;
  }

  if (game.battle.enemy.hp <= 0) {
    winBattle();
    return;
  }

  runEnemyAction();
  if (game.hero.hp <= 0) {
    loseBattle();
    return;
  }

  game.battle.turn += 1;
  renderPanels();
}

function runHeroAction(actionId) {
  const hero = game.hero;
  const enemy = game.battle.enemy;

  if (actionId === "punch") {
    const damage = calcDamage(20, 30, hero.atk, enemy.def);
    enemy.hp = Math.max(0, enemy.hp - damage);
    hero.charge = clamp(hero.charge + 8, 0, 99);
    logBattle(`那岂不是豚拳：打 ${damage}。`);
    return;
  }

  if (actionId === "wheel") {
    const roll = Math.random();
    if (roll < 0.25) {
      const damage = calcDamage(36, 74, hero.atk + 4, enemy.def);
      enemy.hp = Math.max(0, enemy.hp - damage);
      hero.charge = clamp(hero.charge + 5, 0, 99);
      logBattle(`Matrix，转盘暴击 ${damage}。`);
    } else if (roll < 0.65) {
      const damage = calcDamage(15, 20, hero.atk, enemy.def);
      enemy.hp = Math.max(0, enemy.hp - damage);
      hero.charge = clamp(hero.charge + 12, 0, 99);
      logBattle(`转盘稳落点，伤害 ${damage}，xbmd。`);
    } else {
      const heal = 26;
      hero.hp = clamp(hero.hp + heal, 0, hero.maxHp);
      hero.guard = clamp(hero.guard + 7, 0, 99);
      hero.charge = clamp(hero.charge + 5, 0, 99);
      logBattle(`转盘奶格回血 ${heal}。`);
    }
    return;
  }

  if (actionId === "sleep") {
    const cost = 18;
    if (hero.charge < cost) {
      logBattle("充能不够，困告李妈妈别。" );
      return;
    }
    hero.charge -= cost;
    const heal = 38;
    hero.hp = clamp(hero.hp + heal, 0, hero.maxHp);
    logBattle(`困告扣蓝回血 ${heal}。`);
    return;
  }

  if (actionId === "tea") {
     const cost = 16;
    if (hero.charge < cost) {
      logBattle("充能不够，表演李妈妈别。" );
      return;
    }
    enemy.atk = Math.max(8, enemy.atk - 2);
    hero.charge = clamp(hero.charge - 16, 0, 99);
    logBattle("茶艺表演：敌攻 -2。" );
    return;
  }

  if (actionId === "vc") {
    if (game.bag.vc <= 0) {
      logBattle("vc 空了，恰李妈妈别。" );
      return;
    }
    game.bag.vc -= 1;
    hero.hp = clamp(hero.hp + 72, 0, hero.maxHp);
    hero.charge = clamp(hero.charge + 0, 0, 99);
    logBattle("恰vc咯，回血 72。" );
    return;
  }

  if (actionId === "vd") {
    if (game.bag.vd <= 0) {
      logBattle("vd 空了，恰李妈妈别。" );
      return;
    }
    game.bag.vd -= 1;
    hero.hp = clamp(hero.hp + 48, 0, hero.maxHp);
    hero.overtime = 0;
    hero.charge = clamp(hero.charge + 0, 0, 99);
    logBattle("恰vd咯，回血 48，余毒清空。" );
    return;
  }

  if (actionId === "edict") {
    if (!game.edictUnlocked) {
      logBattle("八子计划没齐，八子宣言李妈妈别。");
      return;
    }
    if (hero.charge < 60) {
      logBattle("充能不够咯，嗯放得出来。");
      return;
    }
    hero.charge -= 60;
    const damage = calcDamage(76, 96, hero.atk + 8, enemy.def);
    enemy.hp = Math.max(0, enemy.hp - damage);
    enemy.atk = Math.max(8, enemy.atk - 2);
    logBattle(`八子宣言落地，伤害 ${damage}。`);
    return;
  }

  if (actionId === "tonic") {
    if (game.bag.tonic <= 0) {
      logBattle("转盘酊没了，李妈妈别。" );
      return;
    }
    game.bag.tonic -= 1;
    const gain = 32;
    hero.charge = clamp(hero.charge + gain, 0, 99);
    logBattle(`转盘酊回蓝 ${gain}。`);
  }
}

function runEnemyAction() {
  const hero = game.hero;
  const enemy = game.battle.enemy;
  const hasMoves = Array.isArray(enemy.specialMoves) && enemy.specialMoves.length > 0;
  const specialEvery = enemy.specialEvery ?? 0;
  const specialReady = hasMoves
    ? (specialEvery > 0 ? game.battle.turn % specialEvery === 0 : Math.random() < 0.35)
    : (enemy.specialEvery > 0 && game.battle.turn % enemy.specialEvery === 0);

  let incoming = calcDamage(10, 16, enemy.atk, hero.def);

  if (specialReady) {
    if (hasMoves) {
      const move = enemy.specialMoves[game.battle.turn % enemy.specialMoves.length];
      logBattle(move.text);

      if (move.type === "damage") {
        incoming += move.bonus || 0;
        if (move.overtime) {
          hero.overtime = Math.max(hero.overtime, move.overtime);
        }
      }

      if (move.type === "heal") {
        enemy.hp = clamp(enemy.hp + (move.amount || 0), 0, enemy.maxHp);
      }

      if (move.type === "buff") {
        enemy.atk += move.atk || 0;
        enemy.def += move.def || 0;
      }

      if (move.type === "debuff") {
        hero.atk = Math.max(6, hero.atk - (move.heroAtk || 0));
        hero.def = Math.max(4, hero.def - (move.heroDef || 0));
        if (move.overtime) {
          hero.overtime = Math.max(hero.overtime, move.overtime);
        }
      }

      if (move.type === "drain") {
        hero.charge = clamp(hero.charge - (move.charge || 0), 0, 99);
      }
    } else {
      incoming += enemy.specialBoost;
      hero.overtime = Math.max(hero.overtime, enemy.debuffTurns || 0);
      logBattle(enemy.specialText);
    }
  }

  if (hero.guard > 0) {
    const blocked = Math.min(hero.guard, Math.ceil(incoming * 0.55));
    incoming = Math.max(3, incoming - blocked);
    hero.guard = Math.max(0, hero.guard - blocked);
    logBattle(`护盾拦下 ${blocked}。`);
  }

  hero.hp = Math.max(0, hero.hp - incoming);
  logBattle(`${enemy.name} 打我 ${incoming}。`);
}

function applyOvertimeTick() {
  if (game.hero.overtime <= 0) {
    return;
  }

  game.hero.overtime -= 1;
  game.hero.hp = Math.max(0, game.hero.hp - 7);
  logBattle("恶劳余毒掉血 7。" );
}

function applyExp(amount) {
  if (!amount) {
    return [];
  }

  const lines = [`经验 +${amount}。`];
  game.hero.exp += amount;

  while (game.hero.exp >= game.hero.nextExp) {
    game.hero.exp -= game.hero.nextExp;
    game.hero.level += 1;
    game.hero.nextExp = Math.round(game.hero.nextExp * 1.35 + 8);
    game.hero.maxHp += 16;
    game.hero.atk += 2;
    game.hero.def += 1;
    lines.push(`升级咯：Lv ${game.hero.level}，HP/攻/防 上调。`);
  }

  return lines;
}

function applyGold(amount) {
  if (!amount) {
    return [];
  }

  game.money += amount;
  return [`豚币 +${amount}。`];
}

function winBattle() {
  const enemy = game.battle.enemy;
  const expGain = enemy.exp ?? 0;
  const goldGain = enemy.gold ?? 0;
  const expLines = applyExp(expGain);
  const goldLines = applyGold(goldGain);
  const bonusLines = [];
  if (enemy.id === "wangrui-boss" && !game.hiddenBossDefeated) {
    game.hiddenBossDefeated = true;
    game.weapon = "肝J";
    game.hero.atk += 10;
    bonusLines.push("获得隐藏武器 肝J，攻击 +10。");
    pushQuestLog("获得肝J，攻击 +10。", false);
  }

  if (enemy.id === "audit-chief" || enemy.id === "opinion-engine") {
    game.bossFlags.add(enemy.id);
    pushQuestLog(`${enemy.name} 已清。`, false);
    updateObjective();
  }

  if (enemy.id === "spar-tingge" || enemy.id === "spar-pange" || enemy.id === "spar-xuanshen") {
    game.sparFlags.add(enemy.id);
    pushQuestLog(`${enemy.name} 切磋完成。`, false);
    updateObjective();
  }

  if (enemy.boss) {
    game.bossDefeated = true;
    updateObjective();
    finishGame(true, expGain, expLines, goldGain, goldLines);
    return;
  }

  game.hero.charge = clamp(game.hero.charge + enemy.rewardCharge, 0, 99);
  game.phase = "explore";
  game.battle = null;
  game.battleLogs = [];

  const lines = [`${enemy.name} 被打趴了。`];
  if (expLines.length) {
    lines.push(...expLines);
  }
  if (goldLines.length) {
    lines.push(...goldLines);
  }
  if (bonusLines.length) {
    lines.push(...bonusLines);
  }
  openDialog("旁白", lines);
}

function loseBattle() {
  finishGame(false, 0, [], 0, []);
}

function finishGame(victory, expGain, expLines, goldGain, goldLines) {
  game.phase = "ending";
  game.battle = null;
  game.dialog = null;

  const elapsedMinutes = Math.max(1, Math.round((Date.now() - game.startTime) / 60000));

  if (victory) {
    const lines = [
      "恶劳魔王倒地，八子计划守住了。",
      `模式：${game.mode.name}，现实耗时 ${elapsedMinutes} 分钟。`,
      `走格子步数 ${game.runMoves}，通关估时 ${game.mode.estimate}。`,
      "世界是规律的演绎，转转盘继续，小米迟早倒闭。",
    ];

    if (expGain) {
      lines.splice(2, 0, `经验 +${expGain}，等级 ${game.hero.level}。`);
    }
    if (expLines.length > 1) {
      lines.splice(3, 0, ...expLines.slice(1));
    }
    if (goldGain) {
      lines.splice(3, 0, `豚币 +${goldGain}，余额 ${game.money}。`);
    }
    if (goldLines.length > 1) {
      lines.splice(4, 0, ...goldLines.slice(1));
    }

    game.ending = {
      title: "胜利：ldj 已下线",
      lines,
    };
  } else {
    game.ending = {
      title: "失利：恶劳反杀",
      lines: [
        "这盘翻车、。",
        "先恰vc咯，或者恰vd咯，再来一盘。",
      ],
    };
  }

  renderPanels();
}

function openDialog(speaker, lines, onClose = null, choices = null, onChoice = null) {
  game.dialog = {
    speaker,
    lines,
    index: 0,
    onClose,
    choices,
    onChoice,
  };
  game.dialogChoiceIndex = 0;
  renderPanels();
}

function promptBattle(name, battleId, promptLine = "要开打啵？") {
  const choices = [
    { label: "开打", value: "fight" },
    { label: "李妈妈别，先走", value: "leave" },
  ];

  openDialog(name, [promptLine], null, choices, (choice) => {
    if (choice === "fight") {
      startBattle(battleId);
      return;
    }
    openDialog("旁白", ["那岂不是先撤咯。"]);
  });
}
function moveDialogChoice(delta) {
  if (!game.dialog || !game.dialog.choices || game.dialog.choices.length <= 1) {
    return;
  }

  const total = game.dialog.choices.length;
  game.dialogChoiceIndex = (game.dialogChoiceIndex + delta + total) % total;
  renderPanels();
}

function stepDialog() {
  if (!game.dialog) {
    return;
  }

  if (game.dialog.choices) {
    const choice = game.dialog.choices[game.dialogChoiceIndex];
    const onChoice = game.dialog.onChoice;
    game.dialog = null;
    if (onChoice) {
      onChoice(choice.value);
    }
    renderPanels();
    return;
  }

  if (game.dialog.index < game.dialog.lines.length - 1) {
    game.dialog.index += 1;
    renderPanels();
    return;
  }

  const onClose = game.dialog.onClose;
  game.dialog = null;
  if (onClose) {
    onClose();
  }
  renderPanels();
}

function loop() {
  drawWorld();
  requestAnimationFrame(loop);
}

function drawWorld() {
  ctx.clearRect(0, 0, refs.canvas.width, refs.canvas.height);

  if (game.phase === "title" || game.phase === "ending") {
    drawBackdrop();
    return;
  }

  const map = MAPS[game.mapId];
  const cameraX = clamp(game.player.x - Math.floor(VIEW_COLS / 2), 0, Math.max(0, map.width - VIEW_COLS));
  const cameraY = clamp(game.player.y - Math.floor(VIEW_ROWS / 2), 0, Math.max(0, map.height - VIEW_ROWS));

  for (let row = 0; row < VIEW_ROWS; row += 1) {
    for (let col = 0; col < VIEW_COLS; col += 1) {
      const mapX = cameraX + col;
      const mapY = cameraY + row;
      const tile = getTile(game.mapId, mapX, mapY);
      drawTile(col * TILE_SIZE, row * TILE_SIZE, tile);
    }
  }

  const npcs = NPCS.filter((npc) => npc.mapId === game.mapId);
  for (const npc of npcs) {
    const screenX = (npc.x - cameraX) * TILE_SIZE;
    const screenY = (npc.y - cameraY) * TILE_SIZE;
    if (screenX < -TILE_SIZE || screenY < -TILE_SIZE || screenX > refs.canvas.width || screenY > refs.canvas.height) {
      continue;
    }
    drawSprite(screenX, screenY, npc.palette, "down", 0);
  }

  const playerX = (game.player.x - cameraX) * TILE_SIZE;
  const playerY = (game.player.y - cameraY) * TILE_SIZE;
  drawSprite(
    playerX,
    playerY,
    { hair: "#203b8f", body: "#39b5db", accent: "#e8fbff" },
    game.player.dir,
    game.player.frame,
  );

  if (game.phase === "battle") {
    ctx.fillStyle = "rgba(10, 6, 20, 0.35)";
    ctx.fillRect(0, 0, refs.canvas.width, refs.canvas.height);
  }
}

function drawBackdrop() {
  const grad = ctx.createLinearGradient(0, 0, 0, refs.canvas.height);
  grad.addColorStop(0, "#162945");
  grad.addColorStop(1, "#0f1a2d");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, refs.canvas.width, refs.canvas.height);

  for (let i = 0; i < 80; i += 1) {
    ctx.fillStyle = i % 2 === 0 ? "#ffffff" : "#87b2e7";
    ctx.fillRect((i * 37) % refs.canvas.width, (i * 53) % refs.canvas.height, 2, 2);
  }
}

function drawTile(screenX, screenY, tile) {
  if (tile === ".") {
    ctx.fillStyle = "#2f8a4e";
    ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
    ctx.fillStyle = "#3fa65f";
    ctx.fillRect(screenX + 4, screenY + 6, 3, 3);
    ctx.fillRect(screenX + 18, screenY + 18, 3, 3);
    return;
  }

  if (tile === ",") {
    ctx.fillStyle = "#2d7a46";
    ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
    ctx.fillStyle = "#5fc26f";
    for (let i = 0; i < 8; i += 1) {
      ctx.fillRect(screenX + 2 + i * 4, screenY + 4 + ((i % 2) * 7), 2, 8);
    }
    return;
  }

  if (tile === "=") {
    ctx.fillStyle = "#a78f63";
    ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
    ctx.fillStyle = "#c2aa7d";
    ctx.fillRect(screenX, screenY + 11, TILE_SIZE, 3);
    return;
  }

  if (tile === "#") {
    ctx.fillStyle = "#265134";
    ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
    ctx.fillStyle = "#397548";
    ctx.fillRect(screenX + 3, screenY + 3, TILE_SIZE - 6, TILE_SIZE - 6);
    return;
  }

  if (tile === "~") {
    ctx.fillStyle = "#2c6cb4";
    ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
    ctx.fillStyle = "#5f9be1";
    ctx.fillRect(screenX, screenY + 6, TILE_SIZE, 3);
    ctx.fillRect(screenX, screenY + 18, TILE_SIZE, 3);
    return;
  }

  if (tile === "H") {
    ctx.fillStyle = "#8f4d39";
    ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
    ctx.fillStyle = "#bf6c52";
    ctx.fillRect(screenX + 2, screenY + 2, TILE_SIZE - 4, 10);
    return;
  }

  if (tile === "C") {
    ctx.fillStyle = "#59657d";
    ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
    ctx.fillStyle = "#7d8da8";
    ctx.fillRect(screenX + 2, screenY + 2, TILE_SIZE - 4, TILE_SIZE - 4);
    return;
  }

  if (tile === "D" || tile === "G") {
    ctx.fillStyle = tile === "D" ? "#d7b25c" : "#b18a3b";
    ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
    ctx.fillStyle = "#6d4d23";
    ctx.fillRect(screenX + 10, screenY + 8, 12, 16);
    return;
  }

  if (tile === "f") {
    ctx.fillStyle = "#6f5a43";
    ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
    ctx.fillStyle = "#8a7258";
    ctx.fillRect(screenX, screenY + 15, TILE_SIZE, 2);
    return;
  }

  if (tile === "w") {
    ctx.fillStyle = "#3f3f4e";
    ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
    ctx.fillStyle = "#59607a";
    ctx.fillRect(screenX + 3, screenY + 3, TILE_SIZE - 6, TILE_SIZE - 6);
    return;
  }

  if (tile === "b") {
    ctx.fillStyle = "#8f6d45";
    ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
    ctx.fillStyle = "#a88a60";
    ctx.fillRect(screenX + 4, screenY + 4, TILE_SIZE - 8, TILE_SIZE - 8);
    return;
  }

  if (tile === "t") {
    ctx.fillStyle = "#5f486b";
    ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
    ctx.fillStyle = "#8a69a2";
    ctx.fillRect(screenX + 5, screenY + 4, TILE_SIZE - 10, TILE_SIZE - 8);
    return;
  }

  if (tile === "M") {
    ctx.fillStyle = "#4d4f5c";
    ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
    ctx.fillStyle = "#6d7386";
    ctx.fillRect(screenX + 3, screenY + 6, TILE_SIZE - 6, TILE_SIZE - 9);
    return;
  }

  if (tile === "O") {
    ctx.fillStyle = "#7b5c3e";
    ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
    ctx.fillStyle = "#a5825c";
    ctx.fillRect(screenX + 2, screenY + 5, TILE_SIZE - 4, 10);
    return;
  }

  if (tile === "P") {
    ctx.fillStyle = "#3c4f3a";
    ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
    ctx.fillStyle = "#5f7a5a";
    ctx.fillRect(screenX + 4, screenY + 3, TILE_SIZE - 8, TILE_SIZE - 6);
    return;
  }

  if (tile === "L") {
    ctx.fillStyle = "#3b2a1a";
    ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
    ctx.fillStyle = "#d7b25c";
    ctx.fillRect(screenX + 4, screenY + 6, TILE_SIZE - 8, 12);
    ctx.fillStyle = "#8b6a2b";
    ctx.fillRect(screenX + 4, screenY + 11, TILE_SIZE - 8, 2);
    ctx.fillStyle = "#e6d66f";
    ctx.fillRect(screenX + 11, screenY + 9, 2, 4);
    return;
  }

  ctx.fillStyle = "#000";
  ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
}

function drawSprite(screenX, screenY, palette, direction, frame) {
  const x = screenX + 8;
  const y = screenY + 6;
  const step = frame === 0 ? 0 : 1;

  ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
  ctx.fillRect(x + 1, y + 13, 14, 3);

  ctx.fillStyle = palette.hair;
  ctx.fillRect(x + 2, y, 12, 4);

  ctx.fillStyle = "#ffd9b7";
  ctx.fillRect(x + 3, y + 4, 10, 6);

  ctx.fillStyle = palette.body;
  ctx.fillRect(x + 2, y + 9, 12, 5);

  ctx.fillStyle = palette.accent;
  ctx.fillRect(x + 7, y + 10, 2, 3);

  ctx.fillStyle = "#1d2a45";
  if (direction === "left") {
    ctx.fillRect(x + 2, y + 14, 3, 2 + step);
    ctx.fillRect(x + 9, y + 14, 3, 2 - step);
  } else if (direction === "right") {
    ctx.fillRect(x + 2, y + 14, 3, 2 - step);
    ctx.fillRect(x + 9, y + 14, 3, 2 + step);
  } else if (direction === "up") {
    ctx.fillRect(x + 2, y + 14, 3, 2);
    ctx.fillRect(x + 9, y + 14, 3, 2);
    ctx.fillStyle = palette.hair;
    ctx.fillRect(x + 2, y + 2, 12, 3);
  } else {
    ctx.fillRect(x + 2, y + 14, 3, 2 + step);
    ctx.fillRect(x + 9, y + 14, 3, 2 - step);
  }

  ctx.fillStyle = "#111";
  if (direction === "up") {
    ctx.fillRect(x + 4, y + 5, 1, 1);
    ctx.fillRect(x + 10, y + 5, 1, 1);
  } else if (direction === "left") {
    ctx.fillRect(x + 4, y + 6, 1, 1);
  } else if (direction === "right") {
    ctx.fillRect(x + 11, y + 6, 1, 1);
  } else {
    ctx.fillRect(x + 5, y + 6, 1, 1);
    ctx.fillRect(x + 9, y + 6, 1, 1);
  }
}

function renderPanels() {
  refs.titleScreen.classList.toggle("hidden", game.phase !== "title");
  refs.gameScreen.classList.toggle("hidden", game.phase === "title" || game.phase === "ending");
  refs.endingScreen.classList.toggle("hidden", game.phase !== "ending");
  refs.topBanner.classList.toggle("hidden", game.phase !== "title");

  const showDpad = game.phase === "explore";
  if (refs.dpad) {
    refs.dpad.classList.toggle("hidden", !showDpad);
  }

  const moveDisabled = game.phase !== "explore" || game.dialog || game.battle;
  dpadMoveButtons.forEach((button) => {
    button.disabled = moveDisabled;
  });

  const actionDisabled = game.phase === "title" || game.phase === "ending" || game.battle;
  dpadActionButtons.forEach((button) => {
    button.disabled = actionDisabled;
  });

  if (refs.sellGupiaoBtn) {
    refs.sellGupiaoBtn.disabled = moveDisabled;
  }

  if (game.phase === "title") {
    refs.dialogPanel.classList.add("hidden");
    refs.battlePanel.classList.add("hidden");
    return;
  }

  if (game.phase === "ending") {
    refs.endingTitle.textContent = game.ending.title;
    setParagraphs(refs.endingText, game.ending.lines);
    return;
  }

  const map = MAPS[game.mapId];
  refs.mapName.textContent = `地图：${map.name}`;
  const weaponText = game.weapon ? ` | 武器 ${game.weapon}` : "";
  refs.heroStats.textContent = `Lv ${game.hero.level} | EXP ${game.hero.exp}/${game.hero.nextExp} | HP ${game.hero.hp}/${game.hero.maxHp} | 攻 ${game.hero.atk} 防 ${game.hero.def} | 盾 ${game.hero.guard} | 充能 ${game.hero.charge}${weaponText}`;
  refs.bagStats.textContent = `背包：VC ${game.bag.vc}，VD ${game.bag.vd}，转盘酊 ${game.bag.tonic || 0}，谷票 ${game.bag.gupiao || 0}（价 ${game.gupiaoPrice}），余毒 ${game.hero.overtime}`;
  refs.moneyStats.textContent = `豚币：${game.money}`;
  refs.questStats.textContent = `主线：${game.objective}`;
  refs.timeStats.textContent = `时长：${game.mode.name}（${game.mode.estimate}）| 步数 ${game.runMoves}`;

  renderQuestLog();
  renderDialogPanel();
  renderBattlePanel();
}

function renderQuestLog() {
  refs.questLog.innerHTML = "";
  for (const line of game.questLog) {
    const li = document.createElement("li");
    li.textContent = line;
    refs.questLog.appendChild(li);
  }
}

function renderDialogPanel() {
  if (!game.dialog) {
    refs.dialogPanel.classList.add("hidden");
    return;
  }

  refs.dialogPanel.classList.remove("hidden");
  refs.dialogSpeaker.textContent = game.dialog.speaker;
  setParagraphs(refs.dialogText, [game.dialog.lines[game.dialog.index]]);

  refs.dialogActions.innerHTML = "";

  if (game.dialog.choices) {
    game.dialog.choices.forEach((choice, index) => {
      const button = document.createElement("button");
      button.type = "button";
      const marker = index === game.dialogChoiceIndex ? "▶" : "·";
      button.textContent = `${marker} ${choice.label}`;
      button.addEventListener("click", () => {
        game.dialogChoiceIndex = index;
        stepDialog();
      });
      refs.dialogActions.appendChild(button);
    });
    return;
  }

  const button = document.createElement("button");
  button.type = "button";
  const last = game.dialog.index === game.dialog.lines.length - 1;
  button.textContent = last ? "收口（Enter）" : "继续（Enter）";
  button.addEventListener("click", () => stepDialog());
  refs.dialogActions.appendChild(button);
}

function renderBattlePanel() {
  if (game.phase !== "battle" || !game.battle) {
    refs.battlePanel.classList.add("hidden");
    return;
  }

  refs.battlePanel.classList.remove("hidden");
  const enemy = game.battle.enemy;
  refs.battleTitle.textContent = enemy.boss ? "Boss 战" : "野外战";
  refs.battleEnemy.textContent = `敌方：${enemy.name} | HP ${enemy.hp}/${enemy.maxHp} | 攻 ${enemy.atk} 防 ${enemy.def}`;
  refs.battleHero.textContent = `我方：Lv ${game.hero.level} | HP ${game.hero.hp}/${game.hero.maxHp} | 盾 ${game.hero.guard} | 充能 ${game.hero.charge} | VC ${game.bag.vc} VD ${game.bag.vd} | 转盘酊 ${game.bag.tonic || 0}`;

  refs.battleActions.innerHTML = "";
  for (const action of BATTLE_ACTIONS) {
    const button = document.createElement("button");
    button.type = "button";
    let label = action.label;
    if (action.id === "edict" && !game.edictUnlocked) {
      label = `${action.label}（未解锁）`;
    }
    button.textContent = label;
    button.addEventListener("click", () => runBattleTurn(action.id));

    if (action.id === "edict" && (!game.edictUnlocked || game.hero.charge < 40)) {
      button.disabled = true;
    }
    if (action.id === "vc" && game.bag.vc <= 0) {
      button.disabled = true;
    }
    if (action.id === "vd" && game.bag.vd <= 0) {
      button.disabled = true;
    }
    if (action.id === "tonic" && (game.bag.tonic || 0) <= 0) {
      button.disabled = true;
    }

    refs.battleActions.appendChild(button);
  }

  refs.battleLog.innerHTML = "";
  for (const line of game.battleLogs.slice(-8)) {
    const p = document.createElement("p");
    p.textContent = line;
    refs.battleLog.appendChild(p);
  }
  refs.battleLog.scrollTop = refs.battleLog.scrollHeight;
}

function setParagraphs(container, lines) {
  container.innerHTML = "";
  for (const line of lines) {
    const p = document.createElement("p");
    p.textContent = line;
    container.appendChild(p);
  }
}

function logBattle(line) {
  game.battleLogs.push(line);
  if (game.battleLogs.length > 48) {
    game.battleLogs.shift();
  }
}

function pushQuestLog(line, front = false) {
  if (front) {
    game.questLog.unshift(line);
    if (game.questLog.length > QUEST_LOG_LIMIT) {
      game.questLog.pop();
    }
  } else {
    game.questLog.push(line);
    if (game.questLog.length > QUEST_LOG_LIMIT) {
      game.questLog.shift();
    }
  }
}

function getTile(mapId, x, y) {
  const map = MAPS[mapId];
  if (x < 0 || y < 0 || x >= map.width || y >= map.height) {
    return "#";
  }
  return map.rows[y][x];
}

function findNpcAt(mapId, x, y) {
  return NPCS.find((npc) => npc.mapId === mapId && npc.x === x && npc.y === y) || null;
}

function getFacingTile() {
  const map = MAPS[game.mapId];
  let x = game.player.x;
  let y = game.player.y;

  if (game.player.dir === "up") y -= 1;
  if (game.player.dir === "down") y += 1;
  if (game.player.dir === "left") x -= 1;
  if (game.player.dir === "right") x += 1;

  x = clamp(x, 0, map.width - 1);
  y = clamp(y, 0, map.height - 1);

  return { x, y };
}

function calcDamage(min, max, attacker, defender) {
  return Math.max(6, randomInt(min, max) + attacker - defender);
}

function randomInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}
